name: Generate WakaTime Cards

on:
  workflow_dispatch:
  schedule:
    # Every day at 03:15 UTC
    - cron: "15 3 * * *"

permissions:
  contents: write

concurrency:
  group: wakatime-card
  cancel-in-progress: true

jobs:
  generate:
    name: Generate WakaTime SVG cards
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out master branch
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate light and dark cards
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          WAKATIME_RANGE: last_30_days
          MAX_LANGUAGES: "8"
        run: python scripts/generate_wakatime_card.py

      - name: Update README cache version
        env:
          CACHE_VERSION: ${{ github.run_id }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("README.md")

          if not path.exists():
              raise FileNotFoundError("README.md could not be found")

          content = path.read_text(encoding="utf-8")
          version = os.environ["CACHE_VERSION"]

          replacements = {
              "wakatime-dark.svg": (
                  rf"(wakatime-dark\.svg)(?:\?v=[^\"'\s>]*)?"
              ),
              "wakatime-light.svg": (
                  rf"(wakatime-light\.svg)(?:\?v=[^\"'\s>]*)?"
              ),
          }

          for filename, pattern in replacements.items():
              content = re.sub(
                  pattern,
                  rf"\1?v={version}",
                  content,
              )

          path.write_text(content, encoding="utf-8")

          print(f"README cache version updated to {version}")
          PY

      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            README.md \
            assets/wakatime-light.svg \
            assets/wakatime-dark.svg

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update WakaTime cards"
          git push origin HEAD:master
