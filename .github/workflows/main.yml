name: Update WakaTime Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  update-readme:
    name: Update README with WakaTime
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Update WakaTime section
        uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}

          REPOSITORY: karamusluk/karamusluk
          TARGET_BRANCH: master
          TARGET_PATH: README.md
          SECTION_NAME: waka

          SHOW_TITLE: false
          SHOW_TIME: true
          SHOW_TOTAL: true
          SHOW_MASKED_TIME: false
          TIME_RANGE: last_30_days
          LANG_COUNT: 8

          COMMIT_MESSAGE: "chore: update WakaTime stats"
