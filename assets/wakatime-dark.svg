<svg xmlns="http://www.w3.org/2000/svg" width="820" height="624" viewBox="0 0 820 624" role="img" aria-labelledby="title desc">
<title id="title">Weekly Development Activity</title>
<desc id="desc">92 hrs 33 mins of coding activity during last month.</desc>

<defs>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
    <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#00000066" />
  </filter>
</defs>

<style>
  text {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  .title { fill: #F0F6FC; font-size: 25px; font-weight: 700; }
  .meta { fill: #8B949E; font-size: 13px; font-weight: 500; }
  .total { fill: #E6EDF3; font-size: 17px; font-weight: 650; }
  .language { fill: #E6EDF3; font-size: 15px; font-weight: 600; }
  .duration { fill: #8B949E; font-size: 14px; }
  .percent { fill: #8B949E; font-size: 13px; font-variant-numeric: tabular-nums; }
  .empty { fill: #8B949E; font-size: 15px; }
</style>

<rect x="12" y="12" width="796" height="600" rx="20"
      fill="#0D1117" stroke="#30363D" filter="url(#shadow)" />

<text x="40" y="53" class="title">Weekly Development Activity</text>
<text x="40" y="78" class="meta">last month</text>
<text x="780" y="53" text-anchor="end" class="meta">TOTAL CODING TIME</text>
