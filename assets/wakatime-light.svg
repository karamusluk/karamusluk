<svg xmlns="http://www.w3.org/2000/svg" width="820" height="624" viewBox="0 0 820 624" role="img" aria-labelledby="title desc">
<title id="title">Weekly Development Activity</title>
<desc id="desc">37 hrs 34 mins of coding activity during last month.</desc>

<defs>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
    <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1F23281A" />
  </filter>
</defs>

<style>
  text {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  .title { fill: #1F2328; font-size: 25px; font-weight: 700; }
  .meta { fill: #656D76; font-size: 13px; font-weight: 500; }
  .total { fill: #1F2328; font-size: 17px; font-weight: 650; }
  .language { fill: #1F2328; font-size: 15px; font-weight: 600; }
  .duration { fill: #656D76; font-size: 14px; }
  .percent { fill: #656D76; font-size: 13px; font-variant-numeric: tabular-nums; }
  .empty { fill: #656D76; font-size: 15px; }
</style>

<rect x="12" y="12" width="796" height="600" rx="20"
      fill="#FFFFFF" stroke="#D0D7DE" filter="url(#shadow)" />

